framework: "net9.0"
overview: "Sync media content from a source Jellyfin server to this server."
description: >
  Server Sync enables one-way content synchronization from a source Jellyfin server to a local server.
  The plugin periodically scans the source server for media items (Movies, Episodes, Audio, Video)
  and downloads missing or updated content. Features include library-to-library mapping with path
  translation, ETag-based change detection, configurable approval workflows, bandwidth throttling
  with time-based scheduling, and companion file support (subtitles, etc.).
category: "General"
owner: "JPKribs"
artifacts:
- "Jellyfin.Plugin.ServerSync.dll"
changelog: >
  Initial release of Server Sync plugin for Jellyfin 10.11.

  Features:
  - One-way sync from source server to local server
  - Library-to-library mapping with path translation
  - ETag-based change detection for reliable updates
  - Configurable approval workflow for new content and deletions
  - Bandwidth throttling with time-based scheduling
  - Companion file support (subtitles, etc.)
  - Automatic retry for failed downloads (up to 3 attempts)
  - Pre-download validation to prevent unnecessary downloads
