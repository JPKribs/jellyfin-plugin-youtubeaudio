overview: "Keep multiple Jellyfin servers in sync."
description: >
  Server Sync is a Jellyfin plugin that enables synchronization of media content between multiple Jellyfin servers.
  Supports parent-child relationships where children sync back to the parent, and peer-to-peer relationships for
  bi-directional synchronization. Features configurable sync modes including name-only, file size comparison,
  and date-based matching with conflict resolution options.
