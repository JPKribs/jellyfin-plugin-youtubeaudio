<div id="ServerSyncHistoryPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_history.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncHistoryForm">
                <div class="verticalSection verticalSection-extrabottompadding">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">History</h1>
                    </div>

                        <div id="historySyncStatusSummary">
                            <div class="statusCards" id="historyStatusRow">
                                <div class="statusCard statusCard-synced" id="historyStatusGroupSynced" title="">
                                    <span class="statusCard-count" id="historySyncedCount">0</span>
                                    <span class="statusCard-label">Synced</span>
                                </div>
                                <div class="statusCard statusCard-queued" id="historyStatusGroupQueued" title="">
                                    <span class="statusCard-count" id="historyQueuedCount">0</span>
                                    <span class="statusCard-label">Queued</span>
                                </div>
                                <div class="statusCard statusCard-errored" id="historyStatusGroupErrored" title="">
                                    <span class="statusCard-count" id="historyErroredCount">0</span>
                                    <span class="statusCard-label">Errored</span>
                                </div>
                                <div class="statusCard statusCard-ignored" id="historyStatusGroupIgnored" title="">
                                    <span class="statusCard-count" id="historyIgnoredCount">0</span>
                                    <span class="statusCard-label">Ignored</span>
                                </div>
                            </div>
                        </div>

                        <div id="historyHealthDashboard" class="healthDashboard">
                            <div class="healthRow">
                                <div class="healthCard">
                                    <span class="healthLabel">Last Sync</span>
                                    <span class="healthValue" id="historyHealthLastSync">Never</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Users Mapped</span>
                                    <span class="healthValue" id="historyHealthUserCount">0</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Libraries Mapped</span>
                                    <span class="healthValue" id="historyHealthLibraryCount">0</span>
                                </div>
                            </div>
                        </div>

                        <div class="syncActionButtonRow">
                            <button is="emby-button" type="button" id="btnRefreshHistoryItems" class="raised syncActionButton">
                                <span>Refresh</span>
                            </button>
                            <button is="emby-button" type="button" id="btnTriggerHistorySync" class="raised button-primary syncActionButton">
                                <span>Sync</span>
                            </button>
                            <button is="emby-button" type="button" id="btnRetryHistoryErrors" class="raised syncActionButton">
                                <span>Retry Errors</span>
                            </button>
                            <button is="emby-button" type="button" id="btnResetHistoryDatabase" class="raised button-destructive syncActionButton">
                                <span>Reset Database</span>
                            </button>
                        </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- Paginated Table Container for History Items -->
                    <div id="historyItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- History Item Detail Modal -->
    <div id="historyItemDetailModal" class="dialog hidden">
        <div class="dialogContent historyModal-dialog modal-relative">
            <button type="button" id="btnHistoryModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="historyModalTitle" class="modal-title"></h2>
            <div id="historyModalContent" class="modal-body">
                <!-- Top row: Status badge + Server mapping -->
                <div class="historyModal-topRow">
                    <span id="historyModalStatusBadge" class="itemModal-statusBadge"></span>
                    <span id="historyModalServerMapping" class="historyModal-serverMapping"></span>
                </div>

                <!-- Info grid: Last Sync -->
                <div id="historyModalInfoGrid" class="historyModal-infoGrid">
                    <div class="historyModal-infoItem">
                        <div class="historyModal-infoLabel">Last Sync</div>
                        <div id="historyModalLastSync" class="historyModal-infoValue">-</div>
                    </div>
                </div>

                <div id="historyModalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="historyModalError" class="errorMessage"></div>
                </div>

                <!-- User Mapping - separate lines for name and GUID -->
                <div class="historyModal-userSection">
                    <div class="historyModal-userRow">
                        <div class="historyModal-userBlock">
                            <div class="historyModal-userLabel">Source User</div>
                            <div id="historyModalSourceUserName" class="historyModal-userName"></div>
                            <div id="historyModalSourceUserId" class="historyModal-userGuid"></div>
                        </div>
                        <div class="historyModal-userBlock">
                            <div class="historyModal-userLabel">Local User</div>
                            <div id="historyModalLocalUserName" class="historyModal-userName"></div>
                            <div id="historyModalLocalUserId" class="historyModal-userGuid"></div>
                        </div>
                    </div>
                </div>

                <!-- History State Comparison Table -->
                <table class="historyCompareTable">
                    <thead>
                        <tr>
                            <th class="historyCompareTable-property">Property</th>
                            <th id="historyModalSourceHeader" class="historyCompareTable-server">Source</th>
                            <th id="historyModalLocalHeader" class="historyCompareTable-server">Local</th>
                            <th class="historyCompareTable-merged">After Sync</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="historyCompareTable-property">Played</td>
                            <td id="historyModalSourcePlayed" class="historyCompareTable-value">-</td>
                            <td id="historyModalLocalPlayed" class="historyCompareTable-value">-</td>
                            <td id="historyModalMergedPlayed" class="historyCompareTable-value historyCompareTable-merged">-</td>
                        </tr>
                        <tr>
                            <td class="historyCompareTable-property">Favorite</td>
                            <td id="historyModalSourceFavorite" class="historyCompareTable-value">-</td>
                            <td id="historyModalLocalFavorite" class="historyCompareTable-value">-</td>
                            <td id="historyModalMergedFavorite" class="historyCompareTable-value historyCompareTable-merged">-</td>
                        </tr>
                        <tr>
                            <td class="historyCompareTable-property">Play Count</td>
                            <td id="historyModalSourcePlayCount" class="historyCompareTable-value">-</td>
                            <td id="historyModalLocalPlayCount" class="historyCompareTable-value">-</td>
                            <td id="historyModalMergedPlayCount" class="historyCompareTable-value historyCompareTable-merged">-</td>
                        </tr>
                        <tr>
                            <td class="historyCompareTable-property">Position</td>
                            <td id="historyModalSourcePosition" class="historyCompareTable-value">-</td>
                            <td id="historyModalLocalPosition" class="historyCompareTable-value">-</td>
                            <td id="historyModalMergedPosition" class="historyCompareTable-value historyCompareTable-merged">-</td>
                        </tr>
                        <tr>
                            <td class="historyCompareTable-property">Last Played</td>
                            <td id="historyModalSourceLastPlayed" class="historyCompareTable-value">-</td>
                            <td id="historyModalLocalLastPlayed" class="historyCompareTable-value">-</td>
                            <td id="historyModalMergedLastPlayed" class="historyCompareTable-value historyCompareTable-merged">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnHistoryModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnHistoryModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Styles: History Page -->
    <style>
        /* ===== Status Color Variables ===== */
        :root {
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);
            --status-pending-bg: rgba(155, 89, 182, 0.2);
            --status-pending-color: #9b59b6;
            --status-pending-border: rgba(155, 89, 182, 0.3);
        }

        /* ===== Utility Classes ===== */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* Button styles */
        .button-primary {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* Dialog/Modal styling */
        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* Error message styling */
        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* Layout utility classes */
        .hidden { display: none !important; }

        /* Modal field layout */
        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }

    </style>

    <!-- Styles: History Modal and Compare Table -->
    <style>
        /* History Modal specific styles */
        .historyModal-dialog {
            max-width: 900px;
            width: 95vw;
        }

        /* Top row: Status + Server mapping on same line */
        .historyModal-topRow {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .historyModal-serverMapping {
            font-size: 0.9em;
            opacity: 0.8;
        }

        /* Info grid for Last Sync */
        .historyModal-infoGrid {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .historyModal-infoItem {
            flex: 1;
        }
        .historyModal-infoLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .historyModal-infoValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 1em;
            font-weight: 500;
        }

        /* User section - split display */
        .historyModal-userSection {
            margin-bottom: 16px;
        }
        .historyModal-userRow {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .historyModal-userBlock {
            flex: 1;
        }
        .historyModal-userLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .historyModal-userName {
            font-weight: 500;
            margin-bottom: 2px;
        }
        .historyModal-userGuid {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.8em;
            opacity: 0.5;
            word-break: break-all;
        }
        .historyModal-userArrow {
            font-size: 1.2em;
            opacity: 0.5;
            padding-top: 20px;
        }

        /* History comparison table for modal */
        .historyCompareTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .historyCompareTable th,
        .historyCompareTable td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .historyCompareTable th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .historyCompareTable th.historyCompareTable-property {
            text-align: left;
            width: 25%;
        }
        .historyCompareTable th.historyCompareTable-server {
            width: 22%;
        }
        .historyCompareTable th.historyCompareTable-merged {
            width: 22%;
            color: #00a4dc;
        }
        .historyCompareTable td.historyCompareTable-property {
            text-align: left;
            font-weight: 500;
            opacity: 0.8;
        }
        .historyCompareTable td.historyCompareTable-value {
            font-weight: 500;
        }
        .historyCompareTable td.historyCompareTable-merged {
            background: rgba(0,164,220,0.08);
            color: #00a4dc;
            font-weight: 600;
        }
        .historyCompareTable tr:last-child td {
            border-bottom: none;
        }

        /* Sync section separator */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 16px;
            margin-bottom: 16px;
        }

    </style>

    <!-- Styles: Status Cards and Health Dashboard -->
    <style>
        /* Health Dashboard */
        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }
        .healthCard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .healthLabel {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .healthValue {
            font-size: 1.1em;
            font-weight: 500;
        }
        .healthValue.warning { color: var(--status-queued-color); }
        .healthValue.success { color: var(--status-synced-color); }

        /* Status cards */
        .statusCards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .statusCard {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
        }
        .statusCard-count {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .statusCard-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.9;
        }
        .statusCard-synced { background: var(--status-synced-bg); color: var(--status-synced-color); }
        .statusCard-queued { background: var(--status-queued-bg); color: var(--status-queued-color); }
        .statusCard-errored { background: var(--status-errored-bg); color: var(--status-errored-color); }
        .statusCard-ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); }

        /* Sync Action Button Row */
        .syncActionButtonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .syncActionButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* Modal button layout */
        .modalButtonRow { display: flex; gap: 8px; margin-top: 8px; }
        .modalButton { flex: 1; text-align: center; justify-content: center; }

        /* Status Badge */
        .itemModal-statusBadge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .itemModal-statusBadge.Synced { background: var(--status-synced-bg); color: var(--status-synced-color); border: 1px solid var(--status-synced-border); }
        .itemModal-statusBadge.Queued { background: var(--status-queued-bg); color: var(--status-queued-color); border: 1px solid var(--status-queued-border); }
        .itemModal-statusBadge.Errored { background: var(--status-errored-bg); color: var(--status-errored-color); border: 1px solid var(--status-errored-border); }
        .itemModal-statusBadge.Ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); border: 1px solid var(--status-ignored-border); }
        .itemModal-statusBadge.Pending { background: var(--status-pending-bg); color: var(--status-pending-color); border: 1px solid var(--status-pending-border); }

    </style>

    <!-- Styles: PaginatedTable/paginatedTable.css -->
    <style>
        /* ============================================
           PaginatedTable Component Styles
           Prefix: pt- (paginated-table)
           Generic, reusable table component with infinite scroll
           ============================================ */

        .pt-wrapper {
            display: flex;
            flex-direction: column;
        }

        .pt-wrapper.pt-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Top row: Search + Filter */
        .pt-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .pt-search {
            flex: 1;
            min-width: 150px;
        }

        .pt-filter {
            width: auto !important;
            min-width: 140px;
        }

        /* Bottom row: Selection + Bulk actions + Reload */
        .pt-selection-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .pt-select-all-container {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .pt-selected-count {
            margin-left: 8px;
            opacity: 0.7;
            min-width: 80px;
        }

        .pt-bulk-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .pt-header-spacer {
            flex: 1;
        }

        /* Reload button - material icon style */
        .pt-reload-btn {
            background: transparent !important;
            border: none !important;
            padding: 8px !important;
            min-width: 40px !important;
            height: 40px !important;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .pt-reload-btn:hover {
            opacity: 1;
        }

        .pt-reload-btn.spinning .pt-reload-icon {
            animation: spin 0.8s linear infinite;
        }

        .pt-reload-icon {
            font-size: 24px !important;
        }

        /* Table body - scrollable with infinite scroll */
        .pt-body {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Table rows */
        .pt-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: background-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .pt-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .pt-row:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .pt-row:last-child {
            border-bottom: none;
        }

        /* Table cells */
        .pt-cell {
            flex: 1;
            padding: 4px 8px;
            min-width: 0;
        }

        .pt-cell.pt-cell-checkbox {
            flex: 0 0 40px;
            padding: 4px;
        }

        .pt-cell.pt-cell-status {
            flex: 0 0 130px;
            text-align: right;
        }

        .pt-row-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        /* Status badges - clickable button for mobile */
        .pt-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.15s, transform 0.1s;
        }

        .pt-status-badge:hover {
            opacity: 0.85;
        }

        .pt-status-badge:active {
            transform: scale(0.97);
        }

        .pt-status-badge.Synced { background: var(--status-synced-bg); color: var(--status-synced-color); }
        .pt-status-badge.Queued { background: var(--status-queued-bg); color: var(--status-queued-color); }
        .pt-status-badge.Errored { background: var(--status-errored-bg); color: var(--status-errored-color); }
        .pt-status-badge.Ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); }
        .pt-status-badge.Pending { background: var(--status-pending-bg); color: var(--status-pending-color); }

        /* Empty state */
        .pt-empty {
            padding: 32px 16px;
            text-align: center;
            opacity: 0.7;
        }

        /* Loading more indicator */
        .pt-loading-more {
            padding: 12px;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9em;
        }

        /* Footer with item count */
        .pt-footer {
            padding: 8px 12px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* Bulk action buttons */
        .pt-bulk-actions button {
            padding: 4px 12px !important;
            min-width: auto !important;
        }

        .pt-bulk-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Content-specific styles for syncTable use */
        .pt-cell .syncItemInfo {
            flex: 1;
            min-width: 0;
        }

        .pt-cell .syncItemName {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pt-cell .syncItemPath {
            font-size: 0.85em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pt-cell .syncItemError {
            font-size: 0.75em;
            color: var(--status-errored-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

    </style>
</div>
