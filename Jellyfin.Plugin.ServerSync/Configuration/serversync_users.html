<!-- USERSYNC - PAGE -->

<div id="ServerSyncUsersPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_users.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncUsersForm">
                <div class="verticalSection verticalSection-extrabottompadding">

                    <!-- SECTION: Page Header -->

                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">Users</h1>
                    </div>

                    <!-- SECTION: Status Summary Cards -->

                    <div id="userSyncStatusSummary">
                        <div class="statusCards">
                            <div class="statusCard statusCard-synced" title="">
                                <span class="statusCard-count" id="userSyncedCount">0</span>
                                <span class="statusCard-label">Synced</span>
                            </div>
                            <div class="statusCard statusCard-queued" title="">
                                <span class="statusCard-count" id="userQueuedCount">0</span>
                                <span class="statusCard-label">Queued</span>
                            </div>
                            <div class="statusCard statusCard-errored" title="">
                                <span class="statusCard-count" id="userErroredCount">0</span>
                                <span class="statusCard-label">Errored</span>
                            </div>
                            <div class="statusCard statusCard-ignored" title="">
                                <span class="statusCard-count" id="userIgnoredCount">0</span>
                                <span class="statusCard-label">Ignored</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: Health Dashboard -->

                    <div id="userHealthDashboard" class="healthDashboard">
                        <div class="healthRow">
                            <div class="healthCard">
                                <span class="healthLabel">Last Sync</span>
                                <span class="healthValue" id="userHealthLastSync">Never</span>
                            </div>
                            <div class="healthCard">
                                <span class="healthLabel">Users Mapped</span>
                                <span class="healthValue" id="userHealthUserCount">0</span>
                            </div>
                        </div>
                    </div>

                    <!--  SECTION: Action Buttons -->

                    <div class="syncActionButtonRow">
                        <button is="emby-button" type="button" id="btnRefreshUserItems" class="raised syncActionButton">
                            <span>Refresh</span>
                        </button>
                        <button is="emby-button" type="button" id="btnTriggerUserSync" class="raised button-primary syncActionButton">
                            <span>Sync</span>
                        </button>
                        <button is="emby-button" type="button" id="btnRetryUserErrors" class="raised button-primary syncActionButton hidden">
                            <span>Retry Errors</span>
                        </button>
                        <button is="emby-button" type="button" id="btnResetUserDatabase" class="raised button-destructive syncActionButton">
                            <span>Reset Database</span>
                        </button>
                    </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- SECTION: User Sync Items Table -->

                    <div id="userSyncItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- SECTION: User Sync Item Detail Modal -->

    <div id="userSyncItemDetailModal" class="dialog hidden">
        <div class="dialogContent userSyncModal-dialog modal-relative">
            <button type="button" id="btnUserSyncModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="userSyncModalTitle" class="modal-title"></h2>
            <div class="modal-body">

                <!-- Top row: Status badge and server mapping -->
                <div class="userSyncModal-topRow">
                    <span id="userSyncModalStatusBadge" class="itemModal-statusBadge"></span>
                    <span id="userSyncModalServerMapping" class="userSyncModal-serverMapping"></span>
                </div>

                <!-- Info grid: Last sync -->
                <div id="userSyncModalInfoGrid" class="userSyncModal-infoGrid hidden">
                    <div class="userSyncModal-infoItem">
                        <div class="userSyncModal-infoLabel">Last Sync</div>
                        <div id="userSyncModalLastSync" class="userSyncModal-infoValue"></div>
                    </div>
                </div>

                <!-- Error section -->
                <div id="userSyncModalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="userSyncModalError" class="errorMessage"></div>
                </div>

                <!-- Changes Summary Badges -->
                <div id="userSyncModalChangesSummary" class="userSyncModal-changesSummary"></div>

                <!-- User Mapping Section -->
                <div class="userSyncModal-userSection">
                    <div class="userSyncModal-userBlock">
                        <div class="userSyncModal-userLabel">Source User</div>
                        <div id="userSyncModalSourceUser" class="userSyncModal-userName"></div>
                        <div id="userSyncModalSourceUserId" class="userSyncModal-userId"></div>
                    </div>
                    <div class="userSyncModal-userBlock">
                        <div class="userSyncModal-userLabel">Local User</div>
                        <div id="userSyncModalLocalUser" class="userSyncModal-userName"></div>
                        <div id="userSyncModalLocalUserId" class="userSyncModal-userId"></div>
                    </div>
                </div>

                <!-- Property Comparison Table -->
                <div class="userSyncModal-tableContainer">
                    <table class="historyCompareTable">
                        <thead>
                            <tr>
                                <th class="historyCompareTable-property">Property</th>
                                <th id="userSyncModalSourceHeader" class="historyCompareTable-server">Source</th>
                                <th id="userSyncModalLocalHeader" class="historyCompareTable-server">Local</th>
                                <th class="historyCompareTable-merged">After Sync</th>
                            </tr>
                        </thead>
                        <tbody id="userSyncModalTableBody">
                            <!-- Rows populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Modal Action Buttons -->
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnUserSyncModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnUserSyncModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
        </div>
    </div>

    <!-- STYLES -->

    <style>
        /* ===== Status Color Variables ===== */
        :root {
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);
        }

        /* ===== Animations ===== */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== Section Title Styling ===== */
        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* ===== Button Styles ===== */
        .button-primary {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* ===== Dialog/Modal Base Styling ===== */
        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* ===== Error Message Styling ===== */
        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* ===== Layout Utility Classes ===== */
        .hidden { display: none !important; }

        /* ===== User Sync Modal Dialog ===== */
        .userSyncModal-dialog {
            max-width: 900px;
            width: 95vw;
        }

        /* ===== Modal Field Layout ===== */
        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }

        /* ===== History Comparison Table ===== */
        .historyCompareTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .historyCompareTable th,
        .historyCompareTable td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .historyCompareTable th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .historyCompareTable th.historyCompareTable-property {
            text-align: left;
            width: 25%;
        }
        .historyCompareTable th.historyCompareTable-server {
            width: 22%;
        }
        .historyCompareTable th.historyCompareTable-merged {
            width: 22%;
            color: #00a4dc;
        }
        .historyCompareTable td.historyCompareTable-property {
            text-align: left;
            font-weight: 500;
            opacity: 0.8;
        }
        .historyCompareTable td.historyCompareTable-value {
            font-weight: 500;
        }
        .historyCompareTable td.historyCompareTable-merged {
            background: rgba(0,164,220,0.08);
            color: #00a4dc;
            font-weight: 600;
        }
        .historyCompareTable tr:last-child td {
            border-bottom: none;
        }

        /* ===== User Sync Modal - Top Row ===== */
        .userSyncModal-topRow {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .userSyncModal-serverMapping {
            opacity: 0.7;
            font-size: 0.95em;
        }

        /* ===== User Sync Modal - Info Grid ===== */
        .userSyncModal-infoGrid {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }
        .userSyncModal-infoItem {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .userSyncModal-infoLabel {
            font-size: 0.8em;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .userSyncModal-infoValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.95em;
        }

        /* ===== User Sync Modal - Changes Summary ===== */
        .userSyncModal-changesSummary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .userSyncModal-changesBadge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .userSyncModal-changesBadge.has-changes {
            background: rgba(240, 173, 78, 0.2);
            color: #f0ad4e;
        }
        .userSyncModal-changesBadge.no-changes {
            background: rgba(92, 184, 92, 0.2);
            color: #5cb85c;
        }
        .userSyncModal-changesBadge.disabled {
            background: rgba(153, 153, 153, 0.2);
            color: #999;
        }

        /* ===== User Sync Modal - User Section ===== */
        .userSyncModal-userSection {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }
        .userSyncModal-userBlock {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .userSyncModal-userLabel {
            font-size: 0.8em;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .userSyncModal-userName {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 1em;
            font-weight: 500;
        }
        .userSyncModal-userId {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.8em;
            opacity: 0.5;
        }

        /* ===== User Sync Modal - Table Container ===== */
        .userSyncModal-tableContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .userSyncModal-tableContainer table {
            margin: 0;
        }
        .userSyncModal-tableContainer thead {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 1;
        }

        /* ===== User Sync Modal - Changed Rows ===== */
        .userSyncModal-changedRow {
            background: rgba(240, 173, 78, 0.1);
        }
        .userSyncModal-changedRow td:first-child {
            border-left: 3px solid #f0ad4e;
        }

        /* ===== User Sync Modal - Section Headers ===== */
        .userSyncModal-sectionHeader td {
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        /* ===== User Sync Modal - Disabled Row ===== */
        .userSyncModal-disabledRow td {
            padding: 8px 12px;
        }

        /* ===== Section Separator ===== */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 16px;
            margin-bottom: 16px;
        }
    </style>

    <!-- ============================================
         STYLES: Sync Table Component
         ============================================ -->
    <style>
        /* ===== Health Dashboard ===== */
        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }
        .healthCard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .healthLabel {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .healthValue {
            font-size: 1.1em;
            font-weight: 500;
        }
        .healthValue.warning {
            color: var(--status-queued-color);
        }
        .healthValue.success {
            color: var(--status-synced-color);
        }

        /* ===== Status Cards ===== */
        .statusCards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .statusCard {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
        }
        .statusCard-count {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .statusCard-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.9;
        }
        .statusCard-synced {
            background: var(--status-synced-bg);
            color: var(--status-synced-color);
        }
        .statusCard-queued {
            background: var(--status-queued-bg);
            color: var(--status-queued-color);
        }
        .statusCard-errored {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
        }
        .statusCard-ignored {
            background: var(--status-ignored-bg);
            color: var(--status-ignored-color);
        }

        /* ===== Sync Items List ===== */
        .syncItem {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .syncItem:hover {
            background: rgba(255,255,255,0.05);
        }
        .syncItemCheckbox {
            margin-right: 12px;
        }
        .syncItemInfo {
            flex: 1;
            min-width: 0;
        }
        .syncItemName {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemPath {
            font-size: 0.85em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemError {
            font-size: 0.75em;
            color: var(--status-errored-color);

            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 12px;
        }
        .syncItemStatus.Synced { background: var(--status-synced-bg); color: var(--status-synced-color); }
        .syncItemStatus.Queued { background: var(--status-queued-bg); color: var(--status-queued-color); }
        .syncItemStatus.Errored { background: var(--status-errored-bg); color: var(--status-errored-color); }
        .syncItemStatus.Ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); }

        /* ===== Sync Action Button Row ===== */
        .syncActionButtonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .syncActionButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* ===== Sync Table Header ===== */
        .syncTableHeader {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);

        }
        .selectAllContainer {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;

        }
        .syncHeaderButton {

        .syncHeaderButton:disabled {

        }
        .statusFilter {

        }

        /* ===== Reload Table Button ===== */
        .reloadTableButton {

            border: 1px solid rgba(255,255,255,0.2) !important;

            text-transform: uppercase;

        }

        }

            color: var(--status-queued-color);
            border: 1px solid var(--status-queued-border);
        }

            background: var(--status-errored-bg);
            color: var(--status-errored-color);

            background: var(--status-ignored-bg);
            color: var(--status-ignored-color);
            border: 1px solid var(--status-ignored-border);
        }

        /* ===== Modal Button Layout ===== */
        .modalButtonRow {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .modalButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }
    </style>

    <!-- ============================================
         STYLES: PaginatedTable Component
         ============================================ -->
    <style>
        /* ===== PaginatedTable Wrapper ===== */
        .pt-wrapper {
            display: flex;
            flex-direction: column;
        }
        .pt-wrapper.pt-loading {
            opacity: 0.6;
            pointer-events: none;
        }

            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .pt-search {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            outline: none;
        }
        .pt-search:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .pt-filter-wrapper {
            position: relative;
            flex-shrink: 0;
            min-width: 140px;
        }
        .pt-filter {
            width: 100%;
            padding: 10px 36px 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            outline: none;
        }
        .pt-filter:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-filter option {
            background: #1c1c1c;
            color: #fff;
        }
        .pt-filter-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.7;
            font-size: 0.9em;
        }

        /* ===== PaginatedTable Selection Header ===== */
        .pt-selection-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .pt-select-all-label {
            display: flex;
            align-items: center;
            gap: 8px;
