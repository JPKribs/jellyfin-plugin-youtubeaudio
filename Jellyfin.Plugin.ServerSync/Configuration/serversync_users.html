<div id="ServerSyncUsersPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_users.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncUsersForm">
                <div class="verticalSection verticalSection-extrabottompadding">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">Server Sync - Users</h1>
                    </div>

                        <div id="userSyncStatusSummary">
                            <div class="statusCards">
                                <div class="statusCard statusCard-synced" title="">
                                    <span class="statusCard-count" id="userSyncedCount">0</span>
                                    <span class="statusCard-label">Synced</span>
                                </div>
                                <div class="statusCard statusCard-queued" title="">
                                    <span class="statusCard-count" id="userQueuedCount">0</span>
                                    <span class="statusCard-label">Queued</span>
                                </div>
                                <div class="statusCard statusCard-errored" title="">
                                    <span class="statusCard-count" id="userErroredCount">0</span>
                                    <span class="statusCard-label">Errored</span>
                                </div>
                                <div class="statusCard statusCard-ignored" title="">
                                    <span class="statusCard-count" id="userIgnoredCount">0</span>
                                    <span class="statusCard-label">Ignored</span>
                                </div>
                            </div>
                        </div>

                        <div id="userHealthDashboard" class="healthDashboard">
                            <div class="healthRow">
                                <div class="healthCard">
                                    <span class="healthLabel">Last Sync</span>
                                    <span class="healthValue" id="userHealthLastSync">Never</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Users Mapped</span>
                                    <span class="healthValue" id="userHealthUserCount">0</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Pending</span>
                                    <span class="healthValue" id="userHealthPendingCount">0</span>
                                </div>
                            </div>
                        </div>

                        <div class="syncActionButtonRow">
                            <button is="emby-button" type="button" id="btnRefreshUserItems" class="raised syncActionButton">
                                <span>Refresh</span>
                            </button>
                            <button is="emby-button" type="button" id="btnTriggerUserSync" class="raised button-primary syncActionButton">
                                <span>Sync</span>
                            </button>
                            <button is="emby-button" type="button" id="btnRetryUserErrors" class="raised syncActionButton">
                                <span>Retry Errors</span>
                            </button>
                            <button is="emby-button" type="button" id="btnResetUserDatabase" class="raised button-destructive syncActionButton">
                                <span>Reset Database</span>
                            </button>
                        </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- Paginated Table Container for User Sync Items -->
                    <div id="userSyncItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- User Sync Item Detail Modal -->
    <div id="userSyncItemDetailModal" class="dialog hidden">
        <div class="dialogContent max-w-700 modal-relative">
            <button type="button" id="btnUserSyncModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="userSyncModalTitle" class="modal-title"></h2>
            <div class="modal-body">
                <div class="modal-field">
                    <div class="modal-field-label">Status</div>
                    <span id="userSyncModalStatusBadge" class="itemModal-statusBadge"></span>
                </div>
                <div id="userSyncModalLastSyncSection" class="modal-field hidden">
                    <div class="modal-field-label">Last Sync</div>
                    <div id="userSyncModalLastSync"></div>
                </div>
                <div id="userSyncModalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="userSyncModalError" class="errorMessage"></div>
                </div>

                <!-- User Mapping -->
                <div class="modal-field mb-lg">
                    <div class="modal-field-label">User</div>
                    <div id="userSyncModalUser"></div>
                </div>

                <!-- Property Comparison Table -->
                <div class="userSyncModal-tableContainer">
                    <table class="historyCompareTable">
                        <thead>
                            <tr>
                                <th class="historyCompareTable-property">Property</th>
                                <th id="userSyncModalSourceHeader" class="historyCompareTable-server">Source</th>
                                <th id="userSyncModalLocalHeader" class="historyCompareTable-server">Local</th>
                                <th class="historyCompareTable-merged">After Sync</th>
                            </tr>
                        </thead>
                        <tbody id="userSyncModalTableBody">
                            <!-- Rows populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnUserSyncModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnUserSyncModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Styles: shared.css -->
    <style>
        /* Shared styles for Server Sync plugin configuration */

        /* ===== Status Color Variables ===== */
        :root {
            /* Synced - Green */
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);

            /* Queued - Orange/Yellow */
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);

            /* Errored - Red */
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);

            /* Ignored - Gray */
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);

            /* Pending - Purple (generic) */
            --status-pending-bg: rgba(155, 89, 182, 0.2);
            --status-pending-color: #9b59b6;
            --status-pending-border: rgba(155, 89, 182, 0.3);

            /* Pending Download - Purple */
            --status-pending-download-bg: rgba(155, 89, 182, 0.2);
            --status-pending-download-color: #9b59b6;
            --status-pending-download-border: rgba(155, 89, 182, 0.3);

            /* Pending Replacement - Blue */
            --status-pending-replacement-bg: rgba(52, 152, 219, 0.2);
            --status-pending-replacement-color: #3498db;
            --status-pending-replacement-border: rgba(52, 152, 219, 0.3);

            /* Pending Deletion - Red (same as errored) */
            --status-pending-deletion-bg: rgba(217, 83, 79, 0.2);
            --status-pending-deletion-color: #d9534f;
            --status-pending-deletion-border: rgba(217, 83, 79, 0.3);

            /* Deleting - Brighter Red */
            --status-deleting-bg: rgba(231, 76, 60, 0.2);
            --status-deleting-color: #e74c3c;
            --status-deleting-border: rgba(231, 76, 60, 0.3);
        }

        /* ===== Utility Classes ===== */

        /* Text color utilities for status feedback */
        .text-success { color: var(--status-synced-color); }
        .text-error { color: var(--status-errored-color); }
        .text-warning { color: var(--status-queued-color); }
        .text-muted { opacity: 0.7; }

        /* Text truncation */
        .text-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Separator */
        .separator {
            border-bottom: 1px solid #555;
        }

        /* Shared animation for loading spinners */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Section titles with bottom border */
        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* Tab separator line */
        .tabSeparator {
            border-bottom: 1px solid #555;
            margin-bottom: 16px;
        }

        /* Tab navigation - fill width equally */
        .tabContainer {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .tabButton {
            flex: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tabButton span {
            display: block;
            width: 100%;
            text-align: center;
        }
        .tabButton.active {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .tabButton:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Button styles - primary (blue), secondary (gray), destructive (red) */
        .button-primary,
        .button-submit {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover,
        .button-submit:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* Nested settings with left border */
        .nested-settings {
            margin-left: 1.5em;
            padding-left: 1em;
            border-left: 2px solid rgba(85, 85, 85, 0.3);
        }

        /* Input row - horizontal layout for input + select combinations */
        .inputRow {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .inputRow input[is="emby-input"],
        .inputRow .emby-input-wrapper {
            flex: 1;
            margin: 0 !important;
            padding-left: 0 !important;
        }
        .inputRow .inputContainer {
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Content section separator line */
        .contentSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        /* Dialog/Modal styling */
        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* Error message styling */
        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* Generic button row layout */
        .buttonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .buttonRow button {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* Layout utility classes */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-center { display: flex; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .gap-sm { gap: 8px; }
        .gap-md { gap: 16px; }
        .gap-lg { gap: 24px; }

        /* Spacing utility classes */
        .mt-sm { margin-top: 8px; }
        .mt-md { margin-top: 16px; }
        .mb-sm { margin-bottom: 8px; }
        .mb-md { margin-bottom: 12px; }
        .mb-lg { margin-bottom: 16px; }
        .p-md { padding: 16px; }

        /* Width utility classes */
        .w-auto { width: auto !important; }
        .w-80 { width: 80px; }
        .max-w-600 { max-width: 600px; }
        .max-w-700 { max-width: 700px; }

        /* Modal field layout */
        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-field-value { word-break: break-all; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }

        /* Server info display */
        .server-info-box {
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        /* Inline form layout */
        .inline-inputs {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Placeholder text */
        .placeholder-text {
            padding: 16px;
            opacity: 0.7;
        }

    </style>

    <!-- Styles: SourceServer/sourceServer.css -->
    <style>
        /* Source Server Configuration styles */

        /* Collapsible sections */
        .collapsibleSection {
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .collapsibleHeader {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);

            align-items: center;

        }
        .collapsibleIcon {

        }

        /* Server info container */
        #serverInfoContainer {
            padding-bottom: 16px;
        }

    </style>

    <!-- Styles: ContentConfig/contentConfig.css -->
    <style>
        /* Content Sync Configuration styles */

        /* Shared mapping styles - used by library and user mappings */
        .mapping {
            margin-bottom: 2em;
            padding-bottom: 1em;
            border-bottom: 1px solid #555;
        }
        .mapping:last-child {
            border-bottom: none;
            margin-bottom: 1em;
        }
        .mappingGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 24px;
        }
        .mappingHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1em;
        }
        .mappingColumn {
            display: flex;
            flex-direction: column;
        }

    </style>

    <!-- Styles: HistorySync/historySync.css -->
    <style>
        /* History Sync Configuration styles */

        /* History comparison table for modal */
        .historyCompareTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .historyCompareTable th,
        .historyCompareTable td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .historyCompareTable th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .historyCompareTable th.historyCompareTable-property {
            text-align: left;
            width: 25%;
        }
        .historyCompareTable th.historyCompareTable-server {
            width: 22%;
        }
        .historyCompareTable th.historyCompareTable-merged {
            width: 22%;
            color: #00a4dc;
        }
        .historyCompareTable td.historyCompareTable-property {
            text-align: left;
            font-weight: 500;
            opacity: 0.8;
        }
        .historyCompareTable td.historyCompareTable-value {
            font-weight: 500;
        }
        .historyCompareTable td.historyCompareTable-merged {
            background: rgba(0,164,220,0.08);
            color: #00a4dc;
            font-weight: 600;
        }
        .historyCompareTable tr:last-child td {
            border-bottom: none;
        }
        .historyCompareTable .value-yes {
            color: var(--status-synced-color);
        }
        .historyCompareTable .value-no {
            color: var(--status-errored-color);
        }
        .historyCompareTable .value-favorite {
            color: #f0ad4e;
        }
        .historyCompareTable .value-changed {
            color: #00a4dc;
        }

        /* History modal user display */
        .historyModalUserGuid {
            opacity: 0.5;
            font-size: 0.85em;
        }

        /* User Sync Modal Table Container - scrollable */
        .userSyncModal-tableContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .userSyncModal-tableContainer table {
            margin: 0;
        }
        .userSyncModal-tableContainer thead {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 1;
        }

        /* Highlight changed rows in user sync modal */
        .userSyncModal-changedRow {
            background: rgba(240, 173, 78, 0.1);
        }
        .userSyncModal-changedRow td:first-child {
            border-left: 3px solid #f0ad4e;
        }

        /* Section headers in user sync modal */
        .userSyncModal-sectionHeader td {
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        /* Disabled category row */
        .userSyncModal-disabledRow td {
            padding: 8px 12px;
        }

        /* Metadata Sync Modal Table Container - scrollable */
        .metadataSyncModal-tableContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .metadataSyncModal-tableContainer table {
            margin: 0;
        }
        .metadataSyncModal-tableContainer thead {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 1;
        }

        /* Highlight changed rows in metadata sync modal */
        .metadataSyncModal-changedRow {
            background: rgba(240, 173, 78, 0.1);
        }
        .metadataSyncModal-changedRow td:first-child {
            border-left: 3px solid #f0ad4e;
        }

        /* Section headers in metadata sync modal (matches user sync) */
        .metadataSyncModal-sectionHeader td {
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        /* Sync section separator */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 16px;
            margin-bottom: 16px;
        }

    </style>

    <!-- Styles: SyncTable/syncTable.css -->
    <style>
        /* Sync Table styles */

        /* Health Dashboard */
        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }
        .healthCard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .healthLabel {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .healthValue {
            font-size: 1.1em;
            font-weight: 500;
        }
        .healthValue.warning {
            color: var(--status-queued-color);
        }
        .healthValue.error {
            color: var(--status-errored-color);
        }
        .healthValue.success {
            color: var(--status-synced-color);
        }

        /* Separator between stats and table */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-bottom: 16px;
        }

        /* Status cards */
        .statusCards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .statusCard {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
        }
        .statusCard-count {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .statusCard-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.9;
        }
        .statusCard-synced {
            background: var(--status-synced-bg);
            color: var(--status-synced-color);
        }
        .statusCard-queued {
            background: var(--status-queued-bg);
            color: var(--status-queued-color);
        }
        .statusCard-errored {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
        }
        .statusCard-ignored {
            background: var(--status-ignored-bg);
            color: var(--status-ignored-color);
        }
        .statusCard-pending {
            background: var(--status-pending-bg);
            color: var(--status-pending-color);
        }
        .statusCard-pendingDownload {
            background: var(--status-pending-download-bg);
            color: var(--status-pending-download-color);
        }
        .statusCard-pendingReplacement {
            background: var(--status-pending-replacement-bg);
            color: var(--status-pending-replacement-color);
        }
        .statusCard-pendingDeletion {
            background: var(--status-pending-deletion-bg);
            color: var(--status-pending-deletion-color);
        }
        .statusCard-deleting {
            background: var(--status-deleting-bg);
            color: var(--status-deleting-color);
        }

        /* Sync items list */
        .syncItem {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .syncItem:hover {
            background: rgba(255,255,255,0.05);
        }
        .syncItemCheckbox {
            margin-right: 12px;
        }
        .syncItemInfo {
            flex: 1;
            min-width: 0;
        }
        .syncItemName {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemPath {
            font-size: 0.85em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemPath.notExists {
            color: var(--status-pending-download-color);
            font-style: italic;
        }
        .syncItemError {
            font-size: 0.75em;
            color: var(--status-errored-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .syncItemStatus {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 12px;
        }
