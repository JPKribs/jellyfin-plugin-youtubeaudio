<div id="ServerSyncMetadataPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_metadata.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncMetadataForm">
                <div class="verticalSection verticalSection-extrabottompadding">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">Metadata</h1>
                    </div>

                        <div id="metadataSyncStatusSummary">
                            <div class="statusCards" id="metadataStatusRow">
                                <div class="statusCard statusCard-synced" id="metadataStatusGroupSynced" title="">
                                    <span class="statusCard-count" id="metadataSyncedCount">0</span>
                                    <span class="statusCard-label">Synced</span>
                                </div>
                                <div class="statusCard statusCard-queued" id="metadataStatusGroupQueued" title="">
                                    <span class="statusCard-count" id="metadataQueuedCount">0</span>
                                    <span class="statusCard-label">Queued</span>
                                </div>
                                <div class="statusCard statusCard-errored" id="metadataStatusGroupErrored" title="">
                                    <span class="statusCard-count" id="metadataErroredCount">0</span>
                                    <span class="statusCard-label">Errored</span>
                                </div>
                                <div class="statusCard statusCard-ignored" id="metadataStatusGroupIgnored" title="">
                                    <span class="statusCard-count" id="metadataIgnoredCount">0</span>
                                    <span class="statusCard-label">Ignored</span>
                                </div>
                            </div>
                        </div>

                        <div id="metadataHealthDashboard" class="healthDashboard">
                            <div class="healthRow">
                                <div class="healthCard">
                                    <span class="healthLabel">Last Sync</span>
                                    <span class="healthValue" id="metadataHealthLastSync">Never</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Libraries Mapped</span>
                                    <span class="healthValue" id="metadataHealthLibraryCount">0</span>
                                </div>
                                <div class="healthCard">
                                    <span class="healthLabel">Pending</span>
                                    <span class="healthValue" id="metadataHealthPendingCount">0</span>
                                </div>
                            </div>
                        </div>

                        <div class="syncActionButtonRow">
                            <button is="emby-button" type="button" id="btnRefreshMetadataItems" class="raised syncActionButton">
                                <span>Refresh</span>
                            </button>
                            <button is="emby-button" type="button" id="btnTriggerMetadataSync" class="raised button-primary syncActionButton">
                                <span>Sync</span>
                            </button>
                            <button is="emby-button" type="button" id="btnRetryMetadataErrors" class="raised syncActionButton">
                                <span>Retry Errors</span>
                            </button>
                            <button is="emby-button" type="button" id="btnResetMetadataDatabase" class="raised button-destructive syncActionButton">
                                <span>Reset Database</span>
                            </button>
                        </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- Paginated Table Container for Metadata Sync Items -->
                    <div id="metadataSyncItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- Metadata Sync Item Detail Modal -->
    <div id="metadataSyncItemDetailModal" class="dialog hidden">
        <div class="dialogContent max-w-700 modal-relative">
            <button type="button" id="btnMetadataSyncModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="metadataSyncModalTitle" class="modal-title"></h2>
            <div class="modal-body">
                <div class="modal-field">
                    <div class="modal-field-label">Status</div>
                    <span id="metadataSyncModalStatusBadge" class="itemModal-statusBadge"></span>
                </div>
                <div id="metadataSyncModalLastSyncSection" class="modal-field hidden">
                    <div class="modal-field-label">Last Sync</div>
                    <div id="metadataSyncModalLastSync"></div>
                </div>
                <div id="metadataSyncModalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="metadataSyncModalError" class="errorMessage"></div>
                </div>

                <!-- Item info -->
                <div class="modal-field mb-lg">
                    <div class="modal-field-label">Item</div>
                    <div id="metadataSyncModalItem"></div>
                </div>

                <!-- Property Comparison Table -->
                <div class="metadataSyncModal-tableContainer">
                    <table class="historyCompareTable">
                        <thead>
                            <tr>
                                <th class="historyCompareTable-property">Property</th>
                                <th id="metadataSyncModalSourceHeader" class="historyCompareTable-server">Source</th>
                                <th id="metadataSyncModalLocalHeader" class="historyCompareTable-server">Local</th>
                                <th class="historyCompareTable-merged">After Sync</th>
                            </tr>
                        </thead>
                        <tbody id="metadataSyncModalTableBody">
                            <!-- Rows populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnMetadataSyncModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnMetadataSyncModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Styles: shared.css -->
    <style>
        /* Shared styles for Server Sync plugin configuration */

        /* ===== Status Color Variables ===== */
        :root {
            /* Synced - Green */
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);

            /* Queued - Orange/Yellow */
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);

            /* Errored - Red */
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);

            /* Ignored - Gray */
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);

            /* Pending - Purple (generic) */
            --status-pending-bg: rgba(155, 89, 182, 0.2);
            --status-pending-color: #9b59b6;
            --status-pending-border: rgba(155, 89, 182, 0.3);

            /* Pending Download - Purple */
            --status-pending-download-bg: rgba(155, 89, 182, 0.2);
            --status-pending-download-color: #9b59b6;
            --status-pending-download-border: rgba(155, 89, 182, 0.3);

            /* Pending Replacement - Blue */
            --status-pending-replacement-bg: rgba(52, 152, 219, 0.2);
            --status-pending-replacement-color: #3498db;
            --status-pending-replacement-border: rgba(52, 152, 219, 0.3);

            /* Pending Deletion - Red (same as errored) */
            --status-pending-deletion-bg: rgba(217, 83, 79, 0.2);
            --status-pending-deletion-color: #d9534f;
            --status-pending-deletion-border: rgba(217, 83, 79, 0.3);

            /* Deleting - Brighter Red */
            --status-deleting-bg: rgba(231, 76, 60, 0.2);
            --status-deleting-color: #e74c3c;
            --status-deleting-border: rgba(231, 76, 60, 0.3);
        }

        /* ===== Utility Classes ===== */

        /* Text color utilities for status feedback */
        .text-success { color: var(--status-synced-color); }
        .text-error { color: var(--status-errored-color); }
        .text-warning { color: var(--status-queued-color); }
        .text-muted { opacity: 0.7; }

        /* Text truncation */
        .text-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Separator */
        .separator {
            border-bottom: 1px solid #555;
        }

        /* Shared animation for loading spinners */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Section titles with bottom border */
        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* Tab separator line */
        .tabSeparator {
            border-bottom: 1px solid #555;
            margin-bottom: 16px;
        }

        /* Tab navigation - fill width equally */
        .tabContainer {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .tabButton {
            flex: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tabButton span {
            display: block;
            width: 100%;
            text-align: center;
        }
        .tabButton.active {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .tabButton:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Button styles - primary (blue), secondary (gray), destructive (red) */
        .button-primary,
        .button-submit {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover,
        .button-submit:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* Nested settings with left border */
        .nested-settings {
            margin-left: 1.5em;
            padding-left: 1em;
            border-left: 2px solid rgba(85, 85, 85, 0.3);
        }

        /* Input row - horizontal layout for input + select combinations */
        .inputRow {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .inputRow input[is="emby-input"],
        .inputRow .emby-input-wrapper {
            flex: 1;
            margin: 0 !important;
            padding-left: 0 !important;
        }
        .inputRow .inputContainer {
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Content section separator line */
        .contentSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        /* Dialog/Modal styling */
        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* Error message styling */
        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* Generic button row layout */
        .buttonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .buttonRow button {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* Layout utility classes */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-center { display: flex; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .gap-sm { gap: 8px; }
        .gap-md { gap: 16px; }
        .gap-lg { gap: 24px; }

        /* Spacing utility classes */
        .mt-sm { margin-top: 8px; }
        .mt-md { margin-top: 16px; }
        .mb-sm { margin-bottom: 8px; }
        .mb-md { margin-bottom: 12px; }
        .mb-lg { margin-bottom: 16px; }
        .p-md { padding: 16px; }

        /* Width utility classes */
        .w-auto { width: auto !important; }
        .w-80 { width: 80px; }
        .max-w-600 { max-width: 600px; }
        .max-w-700 { max-width: 700px; }

        /* Modal field layout */
        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-field-value { word-break: break-all; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }

        /* Server info display */
        .server-info-box {
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        /* Inline form layout */
        .inline-inputs {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Placeholder text */
        .placeholder-text {
            padding: 16px;
            opacity: 0.7;
        }

    </style>

    <!-- Styles: SourceServer/sourceServer.css -->
    <style>
        /* Source Server Configuration styles */

    <!-- Styles: MetadataSync/metadataSync.css -->
    <style>
        /* Metadata Sync Configuration styles */

        /* Metadata comparison table for modal (reuses historyCompareTable styles) */
        .historyCompareTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .historyCompareTable th,
        .historyCompareTable td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .historyCompareTable th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .historyCompareTable th.historyCompareTable-property {
            text-align: left;
            width: 25%;
        }
        .historyCompareTable th.historyCompareTable-server {
            width: 22%;
        }
        .historyCompareTable th.historyCompareTable-merged {
            width: 22%;
            color: #00a4dc;
        }
        .historyCompareTable td.historyCompareTable-property {
            text-align: left;
            font-weight: 500;
            opacity: 0.8;
        }
        .historyCompareTable td.historyCompareTable-value {
            font-weight: 500;
        }
        .historyCompareTable td.historyCompareTable-merged {
            background: rgba(0,164,220,0.08);
            color: #00a4dc;
            font-weight: 600;
        }
        .historyCompareTable tr:last-child td {
            border-bottom: none;
        }
        .historyCompareTable .value-yes {
            color: var(--status-synced-color);
        }
        .historyCompareTable .value-no {
            color: var(--status-errored-color);
        }
        .historyCompareTable .value-favorite {
            color: #f0ad4e;
        }
        .historyCompareTable .value-changed {
            color: #00a4dc;
        }

        /* Metadata Sync Modal Table Container - scrollable */
        .metadataSyncModal-tableContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .metadataSyncModal-tableContainer table {
            margin: 0;
        }
        .metadataSyncModal-tableContainer thead {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 1;
        }

        /* Highlight changed rows in metadata sync modal */
        .metadataSyncModal-changedRow {
            background: rgba(240, 173, 78, 0.1);
        }
        .metadataSyncModal-changedRow td:first-child {
            border-left: 3px solid #f0ad4e;
        }

        /* Section headers in metadata sync modal */
        .metadataSyncModal-sectionHeader td {
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        /* Sync section separator */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 16px;
            margin-bottom: 16px;
        }

    </style>

    <!-- Styles: SyncTable/syncTable.css -->
    <style>
        /* Sync Table styles */

        /* Health Dashboard */
        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }

            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;

        }
        .syncItemError {

        /* Sync Action Button Row */

        .syncActionButton {

            border: 1px solid var(--status-ignored-border);

            color: var(--status-pending-color);

        }

    <!-- Styles: PaginatedTable/paginatedTable.css -->
    <style>
        /* ============================================
           PaginatedTable Component Styles
           Prefix: pt- (paginated-table)
           Generic, reusable table component with infinite scroll
           ============================================ */

        .pt-wrapper {
            display: flex;
            flex-direction: column;
        }

        .pt-wrapper.pt-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Top row: Search + Filter */
        .pt-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .pt-search {
            flex: 1;
            min-width: 150px;
        }

        .pt-filter {
            width: auto !important;
            min-width: 140px;
        }

        /* Bottom row: Selection + Bulk actions + Reload */
        .pt-selection-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .pt-select-all-container {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .pt-selected-count {
