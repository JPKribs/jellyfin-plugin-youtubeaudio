<!-- METADATASYNC - PAGE -->

<div id="ServerSyncMetadataPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_metadata.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncMetadataForm">
                <div class="verticalSection verticalSection-extrabottompadding">

                    <!-- SECTION: Page Header -->

                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">Metadata</h1>
                    </div>

                    <!-- SECTION: Status Summary Cards -->

                    <div id="metadataSyncStatusSummary">
                        <div class="statusCards" id="metadataStatusRow">
                            <div class="statusCard statusCard-synced" id="metadataStatusGroupSynced" title="">
                                <span class="statusCard-count" id="metadataSyncedCount">0</span>
                                <span class="statusCard-label">Synced</span>
                            </div>
                            <div class="statusCard statusCard-queued" id="metadataStatusGroupQueued" title="">
                                <span class="statusCard-count" id="metadataQueuedCount">0</span>
                                <span class="statusCard-label">Queued</span>
                            </div>
                            <div class="statusCard statusCard-errored" id="metadataStatusGroupErrored" title="">
                                <span class="statusCard-count" id="metadataErroredCount">0</span>
                                <span class="statusCard-label">Errored</span>
                            </div>
                            <div class="statusCard statusCard-ignored" id="metadataStatusGroupIgnored" title="">
                                <span class="statusCard-count" id="metadataIgnoredCount">0</span>
                                <span class="statusCard-label">Ignored</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: Health Dashboard -->

                    <div id="metadataHealthDashboard" class="healthDashboard">
                        <div class="healthRow">
                            <div class="healthCard">
                                <span class="healthLabel">Last Sync</span>
                                <span class="healthValue" id="metadataHealthLastSync">Never</span>
                            </div>
                            <div class="healthCard">
                                <span class="healthLabel">Libraries Mapped</span>
                                <span class="healthValue" id="metadataHealthLibraryCount">0</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: Action Buttons -->

                    <div class="syncActionButtonRow">
                        <button is="emby-button" type="button" id="btnRefreshMetadataItems" class="raised syncActionButton">
                            <span>Refresh</span>
                        </button>
                        <button is="emby-button" type="button" id="btnTriggerMetadataSync" class="raised button-primary syncActionButton">
                            <span>Sync</span>
                        </button>
                        <button is="emby-button" type="button" id="btnRetryMetadataErrors" class="raised button-primary syncActionButton hidden">
                            <span>Retry Errors</span>
                        </button>
                        <button is="emby-button" type="button" id="btnResetMetadataDatabase" class="raised button-destructive syncActionButton">
                            <span>Reset Database</span>
                        </button>
                    </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- SECTION: Paginated Table Container -->

                    <div id="metadataSyncItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: Metadata Sync Item Detail -->

    <div id="metadataSyncItemDetailModal" class="dialog hidden">
        <div class="dialogContent metadataSyncModal-dialog modal-relative">
            <button type="button" id="btnMetadataSyncModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="metadataSyncModalTitle" class="modal-title"></h2>
            <div class="modal-body">

                <!-- Top row: Status badge + Server mapping -->
                <div class="metadataSyncModal-topRow">
                    <span id="metadataSyncModalStatusBadge" class="itemModal-statusBadge"></span>
                    <span id="metadataSyncModalServerMapping" class="metadataSyncModal-serverMapping"></span>
                </div>

                <!-- Info grid: Last Sync + Library -->
                <div id="metadataSyncModalInfoGrid" class="metadataSyncModal-infoGrid">
                    <div class="metadataSyncModal-infoItem">
                        <div class="metadataSyncModal-infoLabel">Last Sync</div>
                        <div id="metadataSyncModalLastSync" class="metadataSyncModal-infoValue">-</div>
                    </div>
                    <div class="metadataSyncModal-infoItem">
                        <div class="metadataSyncModal-infoLabel">Library</div>
                        <div id="metadataSyncModalLibrary" class="metadataSyncModal-infoValue">-</div>
                    </div>
                </div>

                <!-- Error Section -->
                <div id="metadataSyncModalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="metadataSyncModalError" class="errorMessage"></div>
                </div>

                <!-- Changes Summary -->
                <div id="metadataSyncModalChangesSummary" class="metadataSyncModal-changesSummary"></div>

                <!-- Paths Section (Source vs Local side by side) -->
                <div class="metadataSyncModal-pathsSection">
                    <div class="metadataSyncModal-pathRow">
                        <div class="metadataSyncModal-pathBlock">
                            <div class="metadataSyncModal-pathLabel">Source File</div>
                            <div id="metadataSyncModalSourcePath" class="metadataSyncModal-pathValue"></div>
                        </div>
                        <div class="metadataSyncModal-pathBlock">
                            <div class="metadataSyncModal-pathLabel">Local File</div>
                            <div id="metadataSyncModalLocalPath" class="metadataSyncModal-pathValue"></div>
                        </div>
                    </div>
                </div>

                <!-- Property Comparison Table with Subsections -->
                <div class="metadataSyncModal-tableContainer">
                    <table class="historyCompareTable">
                        <thead>
                            <tr>
                                <th class="historyCompareTable-property">Property</th>
                                <th id="metadataSyncModalSourceHeader" class="historyCompareTable-server">Source</th>
                                <th id="metadataSyncModalLocalHeader" class="historyCompareTable-server">Local</th>
                                <th class="historyCompareTable-merged">After Sync</th>
                            </tr>
                        </thead>
                        <tbody id="metadataSyncModalTableBody">
                            <!-- Rows populated dynamically with subsections:
                                 - METADATA (Name, Overview, Dates, Ratings, etc.)
                                 - IMAGES (Image count, total size)
                                 - PEOPLE (Cast/Crew count)
                            -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Modal Actions -->
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnMetadataSyncModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnMetadataSyncModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
        </div>
    </div>

    <!-- STYLES -->

    <!-- Styles: shared.css -->
    <style>
        /* ===== Status Color Variables ===== */
        :root {
            /* Synced - Green */
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);

            /* Queued - Orange/Yellow */
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);

            /* Errored - Red */
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);

            /* Ignored - Gray */
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);

            /* Pending - Purple (generic) */
            --status-pending-bg: rgba(155, 89, 182, 0.2);
            --status-pending-color: #9b59b6;
            --status-pending-border: rgba(155, 89, 182, 0.3);
        }

        /* ===== Utility Classes ===== */

        /* Loading animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== Layout Utilities ===== */

        .hidden { display: none !important; }

        /* ===== Section Title Styling ===== */

        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* ===== Button Styles ===== */

        .button-primary,
        .button-submit {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover,
        .button-submit:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* ===== Dialog/Modal Styling ===== */

        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* ===== Error Message ===== */

        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* ===== Modal Field Layout ===== */

        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }
    </style>

    <!-- Styles: MetadataSync/metadataSync.css -->
    <style>
        /* ===== Metadata Sync Modal Dialog ===== */

        .metadataSyncModal-dialog {
            max-width: 900px;
            width: 95vw;
        }

        /* ===== Metadata Sync Modal - Top Row ===== */

        .metadataSyncModal-topRow {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .metadataSyncModal-serverMapping {
            font-size: 0.9em;
            opacity: 0.8;
        }

        /* ===== Metadata Sync Modal - Info Grid ===== */

        .metadataSyncModal-infoGrid {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .metadataSyncModal-infoItem {
            flex: 1;
        }
        .metadataSyncModal-infoLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .metadataSyncModal-infoValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 1em;
            font-weight: 500;
        }

        /* ===== Metadata Sync Modal - Paths Section ===== */

        .metadataSyncModal-pathsSection {
            margin-bottom: 16px;
        }
        .metadataSyncModal-pathRow {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .metadataSyncModal-pathBlock {
            flex: 1;
            min-width: 0;
        }
        .metadataSyncModal-pathLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .metadataSyncModal-pathValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            word-break: break-all;
        }

        /* ===== Metadata Sync Modal - Changes Summary ===== */

        .metadataSyncModal-changesSummary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .metadataSyncModal-changesBadge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .metadataSyncModal-changesBadge.has-changes {
            background: rgba(240, 173, 78, 0.2);
            color: #f0ad4e;
        }
        .metadataSyncModal-changesBadge.no-changes {
            background: rgba(92, 184, 92, 0.2);
            color: #5cb85c;
        }
        .metadataSyncModal-changesBadge.disabled {
            background: rgba(153, 153, 153, 0.2);
            color: #999;
        }

        /* ===== Metadata Comparison Table ===== */

        .historyCompareTable {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .historyCompareTable th,
        .historyCompareTable td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .historyCompareTable th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .historyCompareTable th.historyCompareTable-property {
            text-align: left;
            width: 25%;
        }
        .historyCompareTable th.historyCompareTable-server {
            width: 22%;
        }
        .historyCompareTable th.historyCompareTable-merged {
            width: 22%;
            color: #00a4dc;
        }
        .historyCompareTable td.historyCompareTable-property {
            text-align: left;
            font-weight: 500;
            opacity: 0.8;
        }
        .historyCompareTable td.historyCompareTable-value {
            font-weight: 500;
            word-break: break-word;
            max-width: 200px;
        }
        .historyCompareTable td.historyCompareTable-merged {
            background: rgba(0,164,220,0.08);
            color: #00a4dc;
            font-weight: 600;
        }
        .historyCompareTable tr:last-child td {
            border-bottom: none;
        }

        /* Table value styling */
        .historyCompareTable .value-yes {
            color: var(--status-synced-color);
        }
        .historyCompareTable .value-no {
            color: var(--status-errored-color);
        }
        .historyCompareTable .value-favorite {
            color: #f0ad4e;
        }
        .historyCompareTable .value-changed {
            color: #00a4dc;
        }

        /* ===== Metadata Sync Modal Table ===== */

        .metadataSyncModal-tableContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .metadataSyncModal-tableContainer table {
            margin: 0;
        }
        .metadataSyncModal-tableContainer thead {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 1;
        }

        /* Changed row highlight */
        .metadataSyncModal-changedRow {
            background: rgba(240, 173, 78, 0.1);
        }
        .metadataSyncModal-changedRow td:first-child {
            border-left: 3px solid #f0ad4e;
        }

        /* Section headers */
        .metadataSyncModal-sectionHeader td {
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        /* Disabled section row */
        .metadataSyncModal-disabledRow td {
            opacity: 0.5;
            font-style: italic;
        }

        /* ===== Sync Section Separator ===== */

        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-top: 16px;
            margin-bottom: 16px;
        }
    </style>

    <!-- Styles: SyncTable/syncTable.css -->
    <style>
        /* ===== Health Dashboard ===== */

        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }
        .healthCard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .healthLabel {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .healthValue {
            font-size: 1.1em;
            font-weight: 500;
        }
        .healthValue.warning {
            color: var(--status-queued-color);
        }
        .healthValue.success {
            color: var(--status-synced-color);
        }

        /* ===== Status Cards ===== */

        .statusCards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .statusCard {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
        }
        .statusCard-count {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .statusCard-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* Status card color variants */
        .statusCard-synced {
            background: var(--status-synced-bg);
            color: var(--status-synced-color);
        }
        .statusCard-queued {
            background: var(--status-queued-bg);
            color: var(--status-queued-color);
        }
        .statusCard-errored {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
        }
        .statusCard-ignored {
            background: var(--status-ignored-bg);
            color: var(--status-ignored-color);
        }
        .statusCard-pending {
            background: var(--status-pending-bg);
            color: var(--status-pending-color);
        }

        /* ===== Sync Items List ===== */

        .syncItem {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .syncItem:hover {
            background: rgba(255,255,255,0.05);
        }
        .syncItemCheckbox {
            margin-right: 12px;
        }
        .syncItemInfo {
            flex: 1;
            min-width: 0;
        }
        .syncItemName {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemPath {
            font-size: 0.85em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .syncItemError {
            font-size: 0.75em;
            color: var(--status-errored-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* ===== Sync Action Button Row ===== */

        .syncActionButtonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .syncActionButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* ===== Modal Button Row ===== */

        .modalButtonRow {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .modalButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* ===== Status Badge ===== */

        .itemModal-statusBadge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status badge color variants */
        .itemModal-statusBadge.Synced {
            background: var(--status-synced-bg);
            color: var(--status-synced-color);
            border: 1px solid var(--status-synced-border);
        }
        .itemModal-statusBadge.Queued {
            background: var(--status-queued-bg);
            color: var(--status-queued-color);
            border: 1px solid var(--status-queued-border);
        }
        .itemModal-statusBadge.Errored {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            border: 1px solid var(--status-errored-border);
        }
        .itemModal-statusBadge.Ignored {
            background: var(--status-ignored-bg);
            color: var(--status-ignored-color);
            border: 1px solid var(--status-ignored-border);
        }
        .itemModal-statusBadge.Pending {
            background: var(--status-pending-bg);
            color: var(--status-pending-color);
            border: 1px solid var(--status-pending-border);
        }
    </style>

    <!-- Styles: PaginatedTable/paginatedTable.css -->
    <style>
        /* ===== PaginatedTable Component ===== */

        .pt-wrapper {
            display: flex;
            flex-direction: column;
        }
        .pt-wrapper.pt-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ===== Controls Row (Search + Filter) ===== */

        .pt-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .pt-search {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            outline: none;
        }
        .pt-search:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .pt-filter-wrapper {
            position: relative;
            flex-shrink: 0;
            min-width: 140px;
        }
        .pt-filter {
            width: 100%;
            padding: 10px 36px 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            outline: none;
        }
        .pt-filter:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-filter option {
            background: #1c1c1c;
            color: #fff;
        }
        .pt-filter-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.7;
            font-size: 0.9em;
        }

        /* ===== Selection Header ===== */

        .pt-selection-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .pt-select-all-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .pt-select-all-label input[type="checkbox"] {
            display: none;
        }
        .pt-checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .pt-select-all-label input[type="checkbox"]:checked + .pt-checkbox-custom {
            background: #00a4dc;
            border-color: #00a4dc;
        }
        .pt-select-all-label input[type="checkbox"]:checked + .pt-checkbox-custom::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
        .pt-select-all-text {
