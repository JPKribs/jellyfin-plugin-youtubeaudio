<!-- Sync Items Section -->
<div class="sectionTitleContainer">
    <h2 class="sectionTitle">Sync Items</h2>
</div>

<!-- Status Cards at top of Sync Items section -->
<div id="syncStatusSummary" class="statusCards">
    <div class="statusCard statusCard-synced" id="statusGroupSynced" title="">
        <span class="statusCard-count" id="syncedCount">0</span>
        <span class="statusCard-label">Synced</span>
    </div>
    <div class="statusCard statusCard-queued" id="statusGroupQueued" title="">
        <span class="statusCard-count" id="queuedCount">0</span>
        <span class="statusCard-label">Queued</span>
    </div>
    <div class="statusCard statusCard-errored" id="statusGroupErrored" title="">
        <span class="statusCard-count" id="erroredCount">0</span>
        <span class="statusCard-label">Errored</span>
    </div>
    <div class="statusCard statusCard-ignored" id="statusGroupIgnored" title="">
        <span class="statusCard-count" id="ignoredCount">0</span>
        <span class="statusCard-label">Ignored</span>
    </div>
    <div class="statusCard statusCard-pendingDownload" id="statusGroupPendingDownload" title="" style="display: none;">
        <span class="statusCard-count" id="pendingDownloadCount">0</span>
        <span class="statusCard-label">Pending Download</span>
    </div>
    <div class="statusCard statusCard-pendingReplacement" id="statusGroupPendingReplacement" title="" style="display: none;">
        <span class="statusCard-count" id="pendingReplacementCount">0</span>
        <span class="statusCard-label">Pending Replace</span>
    </div>
    <div class="statusCard statusCard-pendingDeletion" id="statusGroupPendingDeletion" title="" style="display: none;">
        <span class="statusCard-count" id="pendingDeletionCount">0</span>
        <span class="statusCard-label">Pending Delete</span>
    </div>
    <div class="statusCard statusCard-deleting" id="statusGroupDeleting" title="" style="display: none;">
        <span class="statusCard-count" id="deletingCount">0</span>
        <span class="statusCard-label">Deleting</span>
    </div>
</div>

<!-- Sync Stats -->
<div id="healthDashboard" class="healthDashboard">
    <div class="healthRow">
        <div class="healthCard">
            <span class="healthLabel">Last Sync</span>
            <span class="healthValue" id="healthLastSync">Never</span>
        </div>
        <div class="healthCard">
            <span class="healthLabel">Disk Space</span>
            <span class="healthValue" id="healthDiskSpace">--</span>
        </div>
        <div class="healthCard">
            <span class="healthLabel">Queued Size</span>
            <span class="healthValue" id="healthQueuedSize">--</span>
        </div>
    </div>
</div>

<!-- Action Buttons Row -->
<div class="syncActionButtonRow">
    <button is="emby-button" type="button" id="btnRefreshItems" class="raised syncActionButton">
        <span>Refresh</span>
    </button>
    <button is="emby-button" type="button" id="btnTriggerSync" class="raised button-primary syncActionButton">
        <span>Sync</span>
    </button>
    <button is="emby-button" type="button" id="btnRetryErrors" class="raised syncActionButton">
        <span>Retry Errors</span>
    </button>
    <button is="emby-button" type="button" id="btnResetDatabase" class="raised button-destructive syncActionButton">
        <span>Reset Database</span>
    </button>
    <button is="emby-button" type="button" id="btnReloadTable" class="reloadTableButton" title="Reload table data">
        <span class="reloadIcon">&#x21bb;</span>
    </button>
</div>

<!-- Paginated Table Container - populated by PaginatedTable component -->
<div id="syncItemsTableContainer">
    <!-- PaginatedTable will generate its structure here -->
</div>

<!-- Item Detail Modal -->
<div id="itemDetailModal" class="itemModal" style="display: none;">
    <div class="itemModal-backdrop"></div>
    <div class="itemModal-container">
        <div class="itemModal-header">
            <h2 id="modalTitle" class="itemModal-title"></h2>
            <button type="button" id="btnModalClose" class="itemModal-closeBtn" title="Close">
                <span class="itemModal-closeIcon">&times;</span>
            </button>
        </div>

        <div class="itemModal-body">
            <!-- Status Badge -->
            <div class="itemModal-statusRow">
                <span id="modalStatusBadge" class="itemModal-statusBadge"></span>
            </div>

            <!-- Error Alert -->
            <div id="modalErrorSection" class="itemModal-alert itemModal-alert-error" style="display: none;">
                <div class="itemModal-alertIcon">&#9888;</div>
                <div class="itemModal-alertContent">
                    <div class="itemModal-alertTitle">Error</div>
                    <div id="modalError" class="itemModal-alertMessage"></div>
                </div>
            </div>

            <!-- Info Grid -->
            <div class="itemModal-infoGrid">
                <div class="itemModal-infoItem">
                    <div class="itemModal-infoLabel">Size</div>
                    <div id="modalSize" class="itemModal-infoValue"></div>
                </div>
                <div id="modalRetrySection" class="itemModal-infoItem" style="display: none;">
                    <div class="itemModal-infoLabel">Retry Count</div>
                    <div id="modalRetryCount" class="itemModal-infoValue"></div>
                </div>
                <div id="modalLastSyncSection" class="itemModal-infoItem" style="display: none;">
                    <div class="itemModal-infoLabel">Last Sync</div>
                    <div id="modalLastSync" class="itemModal-infoValue"></div>
                </div>
            </div>

            <!-- Paths Section -->
            <div class="itemModal-section">
                <div class="itemModal-sectionTitle">Paths</div>
                <div class="itemModal-pathItem">
                    <div class="itemModal-pathLabel">Source</div>
                    <div id="modalSourcePath" class="itemModal-pathValue"></div>
                </div>
                <div class="itemModal-pathItem">
                    <div class="itemModal-pathLabel">Local</div>
                    <div id="modalLocalPath" class="itemModal-pathValue"></div>
                    <div id="modalLocalPathNote" class="itemModal-pathNote"></div>
                </div>
            </div>

            <!-- Companion Files Section -->
            <div id="modalCompanionFilesSection" class="itemModal-section" style="display: none;">
                <div class="itemModal-sectionTitle">Companion Files</div>
                <div id="modalCompanionFiles" class="itemModal-companionList"></div>
            </div>
        </div>

        <div class="itemModal-footer">
            <div class="itemModal-actions">
                <button is="emby-button" type="button" id="btnModalIgnore" class="raised itemModal-btn">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnModalQueue" class="raised button-primary itemModal-btn">
                    <span>Queue</span>
                </button>
            </div>
            <div id="modalDeleteRow" class="itemModal-deleteRow">
                <button is="emby-button" type="button" id="btnModalDelete" class="raised button-destructive itemModal-deleteBtn" title="Delete from local server only">
                    <span>Delete from Local Server</span>
                </button>
            </div>
        </div>
    </div>
</div>
