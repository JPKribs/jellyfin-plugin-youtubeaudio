<!-- CONTENTSYNC - PAGE -->

<div id="ServerSyncContentPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-input,emby-button,emby-select,emby-checkbox"
     data-controller="__plugin/serversync_content.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="ServerSyncContentForm">
                <div class="verticalSection verticalSection-extrabottompadding">

                    <!-- SECTION: Page Header -->

                    <div class="sectionTitleContainer flex align-items-center">
                        <h1 class="sectionTitle">Content</h1>
                    </div>

                    <!-- SECTION: Status Summary Cards -->

                    <div id="syncStatusSummary">
                        <!-- Main Status Row -->
                        <div class="statusCards" id="mainStatusRow">
                            <div class="statusCard statusCard-synced" id="statusGroupSynced" title="">
                                <span class="statusCard-count" id="syncedCount">0</span>
                                <span class="statusCard-label">Synced</span>
                            </div>
                            <div class="statusCard statusCard-pending" id="statusGroupPending" title="">
                                <span class="statusCard-count" id="pendingCount">0</span>
                                <span class="statusCard-label">Pending</span>
                            </div>
                            <div class="statusCard statusCard-queued" id="statusGroupQueued" title="">
                                <span class="statusCard-count" id="queuedCount">0</span>
                                <span class="statusCard-label">Queued</span>
                            </div>
                            <div class="statusCard statusCard-errored" id="statusGroupErrored" title="">
                                <span class="statusCard-count" id="erroredCount">0</span>
                                <span class="statusCard-label">Errored</span>
                            </div>
                            <div class="statusCard statusCard-ignored" id="statusGroupIgnored" title="">
                                <span class="statusCard-count" id="ignoredCount">0</span>
                                <span class="statusCard-label">Ignored</span>
                            </div>
                        </div>
                        <!-- Pending Status Row (conditional) -->
                        <div class="statusCards hidden" id="pendingStatusRow">
                            <div class="statusCard statusCard-pendingDownload hidden" id="statusGroupPendingDownload" title="">
                                <span class="statusCard-count" id="pendingDownloadCount">0</span>
                                <span class="statusCard-label">Pending Download</span>
                            </div>
                            <div class="statusCard statusCard-pendingReplacement hidden" id="statusGroupPendingReplacement" title="">
                                <span class="statusCard-count" id="pendingReplacementCount">0</span>
                                <span class="statusCard-label">Pending Replace</span>
                            </div>
                            <div class="statusCard statusCard-pendingDeletion hidden" id="statusGroupPendingDeletion" title="">
                                <span class="statusCard-count" id="pendingDeletionCount">0</span>
                                <span class="statusCard-label">Pending Delete</span>
                            </div>
                            <div class="statusCard statusCard-deleting hidden" id="statusGroupDeleting" title="">
                                <span class="statusCard-count" id="deletingCount">0</span>
                                <span class="statusCard-label">Deleting</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: Health Dashboard -->

                    <div id="healthDashboard" class="healthDashboard">
                        <div class="healthRow">
                            <div class="healthCard">
                                <span class="healthLabel">Last Sync</span>
                                <span class="healthValue" id="healthLastSync">Never</span>
                            </div>
                            <div class="healthCard">
                                <span class="healthLabel">Libraries Mapped</span>
                                <span class="healthValue" id="healthLibraryCount">0</span>
                            </div>
                            <div class="healthCard">
                                <span class="healthLabel">Pending</span>
                                <span class="healthValue" id="healthPendingCount">0</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: Action Buttons -->

                    <div class="syncActionButtonRow">
                        <button is="emby-button" type="button" id="btnRefreshItems" class="raised syncActionButton">
                            <span>Refresh</span>
                        </button>
                        <button is="emby-button" type="button" id="btnTriggerSync" class="raised button-primary syncActionButton">
                            <span>Sync</span>
                        </button>
                        <button is="emby-button" type="button" id="btnRetryErrors" class="raised button-primary syncActionButton hidden">
                            <span>Retry Errors</span>
                        </button>
                        <button is="emby-button" type="button" id="btnResetDatabase" class="raised button-destructive syncActionButton">
                            <span>Reset Database</span>
                        </button>
                    </div>

                    <div class="syncSectionSeparator"></div>

                    <!-- SECTION: Content Items Table -->

                    <div id="syncItemsTableContainer">
                        <!-- PaginatedTable will generate its structure here -->
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- SECTION: Item Detail Modal -->

    <div id="itemDetailModal" class="dialog hidden">
        <div class="dialogContent contentModal-dialog modal-relative">
            <button type="button" id="btnModalClose" class="dialogCloseBtn" title="Close">&times;</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div id="modalContent" class="modal-body">

                <!-- Top row: Status badge + Server mapping -->
                <div class="contentModal-topRow">
                    <span id="modalStatusBadge" class="itemModal-statusBadge"></span>
                    <span id="modalServerMapping" class="contentModal-serverMapping"></span>
                </div>

                <!-- Info grid: Last Sync + Library -->
                <div class="contentModal-infoGrid">
                    <div class="contentModal-infoItem">
                        <div class="contentModal-infoLabel">Last Sync</div>
                        <div id="modalLastSync" class="contentModal-infoValue">-</div>
                    </div>
                    <div class="contentModal-infoItem">
                        <div class="contentModal-infoLabel">Library</div>
                        <div id="modalLibraryMapping" class="contentModal-infoValue">-</div>
                    </div>
                </div>

                <!-- Error Section -->
                <div id="modalErrorSection" class="modal-field hidden">
                    <div class="modal-field-label">Error</div>
                    <div id="modalError" class="errorMessage"></div>
                </div>

                <!-- Retry Section -->
                <div id="modalRetrySection" class="modal-field hidden">
                    <div class="modal-field-label">Retry Count</div>
                    <div id="modalRetryCount"></div>
                </div>

                <!-- Paths Section (Source vs Local side by side) -->
                <div class="contentModal-pathsSection">
                    <div class="contentModal-pathRow">
                        <div class="contentModal-pathBlock">
                            <div class="contentModal-pathLabel">Source Path</div>
                            <div id="modalSourcePath" class="contentModal-pathValue"></div>
                            <div class="contentModal-pathMeta">
                                <span class="contentModal-pathMetaLabel">Size:</span>
                                <span id="modalSourceSize" class="contentModal-pathMetaValue"></span>
                            </div>
                        </div>
                        <div class="contentModal-pathBlock">
                            <div class="contentModal-pathLabel">Local Path</div>
                            <div id="modalLocalPath" class="contentModal-pathValue"></div>
                            <div id="modalLocalPathNote" class="contentModal-pathNote"></div>
                            <div id="modalLocalSizeRow" class="contentModal-pathMeta">
                                <span class="contentModal-pathMetaLabel">Size:</span>
                                <span id="modalLocalSize" class="contentModal-pathMetaValue"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Companion Files Section -->
                <div id="modalCompanionFilesSection" class="modal-field hidden">
                    <div class="modal-field-label">Companion Files</div>
                    <div id="modalCompanionFiles" class="modal-field-value"></div>
                </div>
            </div>

            <!-- Modal Action Buttons -->
            <div class="modalButtonRow">
                <button is="emby-button" type="button" id="btnModalIgnore" class="raised modalButton">
                    <span>Ignore</span>
                </button>
                <button is="emby-button" type="button" id="btnModalQueue" class="raised button-primary modalButton">
                    <span>Queue</span>
                </button>
            </div>
            <div id="modalDeleteRow" class="modalDeleteRow">
                <button is="emby-button" type="button" id="btnModalDelete" class="raised button-destructive modalDeleteButton" title="Delete from local server only">
                    <span>Delete</span>
                </button>
            </div>
        </div>
    </div>

    <!-- STYLES: Content Page Base -->

    <style>
        /* ===== Status Color Variables ===== */
        :root {
            /* Synced - Green */
            --status-synced-bg: rgba(92, 184, 92, 0.2);
            --status-synced-color: #5cb85c;
            --status-synced-border: rgba(92, 184, 92, 0.3);

            /* Queued - Orange/Yellow */
            --status-queued-bg: rgba(240, 173, 78, 0.2);
            --status-queued-color: #f0ad4e;
            --status-queued-border: rgba(240, 173, 78, 0.3);

            /* Errored - Red */
            --status-errored-bg: rgba(217, 83, 79, 0.2);
            --status-errored-color: #d9534f;
            --status-errored-border: rgba(217, 83, 79, 0.3);

            /* Ignored - Gray */
            --status-ignored-bg: rgba(153, 153, 153, 0.2);
            --status-ignored-color: #999;
            --status-ignored-border: rgba(153, 153, 153, 0.3);

            /* Pending - Purple (generic) */
            --status-pending-bg: rgba(155, 89, 182, 0.2);
            --status-pending-color: #9b59b6;
            --status-pending-border: rgba(155, 89, 182, 0.3);

            /* Pending Download - Purple */
            --status-pending-download-bg: rgba(155, 89, 182, 0.2);
            --status-pending-download-color: #9b59b6;
            --status-pending-download-border: rgba(155, 89, 182, 0.3);

            /* Pending Replacement - Blue */
            --status-pending-replacement-bg: rgba(52, 152, 219, 0.2);
            --status-pending-replacement-color: #3498db;
            --status-pending-replacement-border: rgba(52, 152, 219, 0.3);

            /* Pending Deletion - Red */
            --status-pending-deletion-bg: rgba(217, 83, 79, 0.2);
            --status-pending-deletion-color: #d9534f;
            --status-pending-deletion-border: rgba(217, 83, 79, 0.3);

            /* Deleting - Brighter Red */
            --status-deleting-bg: rgba(231, 76, 60, 0.2);
            --status-deleting-color: #e74c3c;
            --status-deleting-border: rgba(231, 76, 60, 0.3);
        }

        /* ===== Animations ===== */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== Section Title Styling ===== */
        .sectionTitleContainer .sectionTitle {
            width: 100%;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5em;
            margin-bottom: 1em;
        }

        /* ===== Button Styles ===== */
        .button-primary {
            background-color: #00a4dc !important;
            color: #fff !important;
        }
        .button-primary:hover {
            background-color: #0088cc !important;
        }
        .button-destructive {
            background-color: var(--status-errored-color) !important;
            color: #fff !important;
        }
        .button-destructive:hover {
            background-color: #c9302c !important;
        }

        /* ===== Dialog/Modal Base Styling ===== */
        .dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .dialogContent {
            background: var(--theme-background-primary, #1c1c1c);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .dialogCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            padding: 4px 8px;
            line-height: 1;
        }
        .dialogCloseBtn:hover {
            opacity: 1;
        }

        /* ===== Error Message Styling ===== */
        .errorMessage {
            background: var(--status-errored-bg);
            color: var(--status-errored-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        /* ===== Layout Utility Classes ===== */
        .hidden { display: none !important; }

        /* ===== Modal Field Layout ===== */
        .modal-field { margin-bottom: 12px; }
        .modal-field-label { opacity: 0.7; margin-bottom: 4px; }
        .modal-title { margin-top: 0; padding-right: 32px; }
        .modal-body { margin: 16px 0; }
        .modal-relative { position: relative; }
    </style>

    <!-- STYLES: Status Cards, Health Dashboard, and Modal -->

    <style>
        /* ===== Health Dashboard ===== */
        .healthDashboard {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .healthRow {
            display: flex;
            gap: 16px;
        }
        .healthCard {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .healthLabel {
            font-size: 0.85em;
            opacity: 0.7;
        }
        .healthValue {
            font-size: 1.1em;
            font-weight: 500;
        }
        .healthValue.warning { color: var(--status-queued-color); }
        .healthValue.success { color: var(--status-synced-color); }

        /* ===== Section Separator ===== */
        .syncSectionSeparator {
            border-bottom: 1px solid #555;
            margin-bottom: 16px;
        }

        /* ===== Status Cards ===== */
        .statusCards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .statusCard {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
        }
        .statusCard-count {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .statusCard-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.9;
        }
        .statusCard-synced { background: var(--status-synced-bg); color: var(--status-synced-color); }
        .statusCard-queued { background: var(--status-queued-bg); color: var(--status-queued-color); }
        .statusCard-errored { background: var(--status-errored-bg); color: var(--status-errored-color); }
        .statusCard-ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); }
        .statusCard-pending { background: var(--status-pending-bg); color: var(--status-pending-color); }
        .statusCard-pendingDownload { background: var(--status-pending-download-bg); color: var(--status-pending-download-color); }
        .statusCard-pendingReplacement { background: var(--status-pending-replacement-bg); color: var(--status-pending-replacement-color); }
        .statusCard-pendingDeletion { background: var(--status-pending-deletion-bg); color: var(--status-pending-deletion-color); }
        .statusCard-deleting { background: var(--status-deleting-bg); color: var(--status-deleting-color); }

        /* ===== Sync Action Button Row ===== */
        .syncActionButtonRow {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .syncActionButton {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        /* ===== Status Badge (Modal) ===== */
        .itemModal-statusBadge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .itemModal-statusBadge.Synced { background: var(--status-synced-bg); color: var(--status-synced-color); border: 1px solid var(--status-synced-border); }
        .itemModal-statusBadge.Queued { background: var(--status-queued-bg); color: var(--status-queued-color); border: 1px solid var(--status-queued-border); }
        .itemModal-statusBadge.Errored { background: var(--status-errored-bg); color: var(--status-errored-color); border: 1px solid var(--status-errored-border); }
        .itemModal-statusBadge.Ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); border: 1px solid var(--status-ignored-border); }
        .itemModal-statusBadge.Pending { background: var(--status-pending-bg); color: var(--status-pending-color); border: 1px solid var(--status-pending-border); }
        .itemModal-statusBadge.Pending-Download { background: var(--status-pending-download-bg); color: var(--status-pending-download-color); border: 1px solid var(--status-pending-download-border); }
        .itemModal-statusBadge.Pending-Replacement { background: var(--status-pending-replacement-bg); color: var(--status-pending-replacement-color); border: 1px solid var(--status-pending-replacement-border); }
        .itemModal-statusBadge.Pending-Deletion { background: var(--status-pending-deletion-bg); color: var(--status-pending-deletion-color); border: 1px solid var(--status-pending-deletion-border); }
        .itemModal-statusBadge.Deleting { background: var(--status-deleting-bg); color: var(--status-deleting-color); border: 1px solid var(--status-deleting-border); }

        /* ===== Companion Files ===== */
        .itemModal-companionItem {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 6px;
            font-size: 0.9em;
        }
        .itemModal-companionIcon { color: rgba(255, 255, 255, 0.5); }
        .itemModal-companionName {
            color: rgba(255, 255, 255, 0.85);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9em;
        }

        /* ===== Content Modal Specific Styles ===== */
        .contentModal-dialog { max-width: 900px; width: 95vw; }
        .contentModal-topRow { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .contentModal-serverMapping { font-size: 0.9em; opacity: 0.8; }
        .contentModal-infoGrid {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .contentModal-infoItem { flex: 1; }
        .contentModal-infoLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .contentModal-infoValue { font-size: 1em; font-weight: 500; }
        .contentModal-pathsSection { margin-bottom: 16px; }
        .contentModal-pathRow {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .contentModal-pathBlock {
            flex: 1;
        }
        .contentModal-pathLabel {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .contentModal-pathValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            word-break: break-all;
        }
        .contentModal-pathNote {
            font-size: 0.8em;
            color: var(--status-pending-download-color);
            margin-top: 6px;
            font-style: italic;
        }
        .contentModal-pathMeta {
            margin-top: 8px;
            font-size: 0.85em;
        }
        .contentModal-pathMetaLabel {
            opacity: 0.6;
            margin-right: 4px;
        }
        .contentModal-pathMetaValue {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        /* ===== Modal Button Layout ===== */
        .modalButtonRow { display: flex; gap: 8px; margin-top: 8px; }
        .modalButton { flex: 1; text-align: center; justify-content: center; }
        .modalDeleteRow { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .modalDeleteButton { width: 100%; text-align: center; justify-content: center; }
    </style>

    <!-- STYLES: PaginatedTable Component -->

    <style>
        /* ===== PaginatedTable Wrapper ===== */
        .pt-wrapper {
            display: flex;
            flex-direction: column;
        }
        .pt-wrapper.pt-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ===== PaginatedTable Controls ===== */
        .pt-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .pt-search {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            outline: none;
        }
        .pt-search:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .pt-filter-wrapper {
            position: relative;
            flex-shrink: 0;
            min-width: 140px;
        }
        .pt-filter {
            width: 100%;
            padding: 10px 36px 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: inherit;
            font-size: 1em;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            outline: none;
        }
        .pt-filter:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .pt-filter option {
            background: #1c1c1c;
            color: #fff;
        }
        .pt-filter-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.7;
            font-size: 0.9em;
        }

        /* ===== PaginatedTable Selection Header ===== */
        .pt-selection-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .pt-select-all-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .pt-select-all-label input[type="checkbox"] {
            display: none;
        }
        .pt-checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .pt-select-all-label input[type="checkbox"]:checked + .pt-checkbox-custom {
            background: #00a4dc;
            border-color: #00a4dc;
        }
        .pt-select-all-label input[type="checkbox"]:checked + .pt-checkbox-custom::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
        .pt-select-all-text {
            font-size: 0.95em;
        }
        .pt-selected-count {
            opacity: 0.7;
            min-width: 80px;
        }
        .pt-bulk-actions {
            display: flex;
            gap: 8px;
        }
        .pt-header-spacer {
            flex: 1;
        }

        /* ===== PaginatedTable Reload Button ===== */
        .pt-reload-btn {
            background: transparent;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .pt-reload-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
        .pt-reload-btn.spinning .pt-reload-icon {
            animation: spin 0.8s linear infinite;
        }
        .pt-reload-icon {
            font-size: 20px;
            color: #fff;
        }

        /* ===== PaginatedTable Body ===== */
        .pt-body {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* ===== PaginatedTable Rows ===== */
        .pt-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: background-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .pt-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .pt-row:active {
            background: rgba(255, 255, 255, 0.1);
        }
        .pt-row:last-child {
            border-bottom: none;
        }

        /* ===== PaginatedTable Cells ===== */
        .pt-cell {
            flex: 1;
            padding: 4px 8px;
            min-width: 0;
        }
        .pt-cell.pt-cell-checkbox {
            flex: 0 0 40px;
            padding: 4px;
        }
        .pt-cell.pt-cell-status {
            flex: 0 0 130px;
            text-align: right;
        }
        .pt-row-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        /* ===== PaginatedTable Status Badges ===== */
        .pt-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.15s, transform 0.1s;
        }
        .pt-status-badge:hover {
            opacity: 0.85;
        }
        .pt-status-badge:active {
            transform: scale(0.97);
        }
        .pt-status-badge.Synced { background: var(--status-synced-bg); color: var(--status-synced-color); }
        .pt-status-badge.Queued { background: var(--status-queued-bg); color: var(--status-queued-color); }
        .pt-status-badge.Errored { background: var(--status-errored-bg); color: var(--status-errored-color); }
        .pt-status-badge.Ignored { background: var(--status-ignored-bg); color: var(--status-ignored-color); }
        .pt-status-badge.Pending { background: var(--status-pending-bg); color: var(--status-pending-color); }
        .pt-status-badge.Pending-Download { background: var(--status-pending-download-bg); color: var(--status-pending-download-color); }
        .pt-status-badge.Pending-Replacement { background: var(--status-pending-replacement-bg); color: var(--status-pending-replacement-color); }
        .pt-status-badge.Pending-Deletion { background: var(--status-pending-deletion-bg); color: var(--status-pending-deletion-color); }
        .pt-status-badge.Deleting { background: var(--status-deleting-bg); color: var(--status-deleting-color); }

        /* ===== PaginatedTable Empty State ===== */
        .pt-empty {
            padding: 32px 16px;
            text-align: center;
            opacity: 0.7;
        }

        /* ===== PaginatedTable Loading Indicator ===== */
        .pt-loading-more {
            padding: 12px;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9em;
        }

        /* ===== PaginatedTable Footer ===== */
        .pt-footer {
            padding: 8px 12px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* ===== PaginatedTable Bulk Actions ===== */
        .pt-bulk-actions button {
            padding: 4px 12px !important;
            min-width: auto !important;
        }
        .pt-bulk-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== PaginatedTable Content Styles ===== */
        .pt-cell .syncItemInfo {
            flex: 1;
            min-width: 0;
        }
        .pt-cell .syncItemName {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pt-cell .syncItemPath {
            font-size: 0.85em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pt-cell .syncItemError {
            font-size: 0.75em;
            color: var(--status-errored-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
    </style>
</div>
